<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | TrustNity</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #F0EDE8 0%, #E7E0D8 100%);
      color: #111;
    }
    .page {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 3rem 1.5rem;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      border-radius: 50%;
      background: #0F6E56;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
    }
    h1 { font-size: 2rem; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #5F5E5A; line-height: 1.7; margin-bottom: 1.8rem; }
    a {
      display: inline-block;
      padding: 0.95rem 1.8rem;
      border-radius: 999px;
      background: #0F6E56;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.15s, background 0.15s;
    }
    a:hover { background: #0a5541; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="page">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>It looks like the page you were looking for doesn’t exist yet. Return to the TrustNity homepage and continue from there.</p>
    <a href="/trustnity/">Go back home</a>
  </div>
</body>
</html>
